model:
  base_learning_rate: 5.0e-05
  target: materialmvp.model.MaterialMVP
  params:
    num_view: 6
    view_size: 256
    drop_cond_prob: 0.1

    noise_in_channels: 12

    lr_scheduler_config:
      warmup_steps: 200
      cosine_steps: 2800
      gamma: 1.0
      min_lr_scale: 0.1

    lora_config:
      enabled: true
      rank: 4
      alpha: 4
      dropout: 0.0
      gradient_checkpointing: true
      train_extra_params: true
      extra_trainable_keywords:
        - learned_text_clip_albedo
        - learned_text_clip_mr
        - learned_text_clip_ref
      target_suffixes:
        - to_q
        - to_k
        - to_v
        - to_out.0
        - to_q_mr
        - to_k_mr
        - to_v_mr
        - to_out_mr.0
      include_keywords:
        - attn1
        - attn2
        - attn_refview
      exclude_keywords:
        - attn_multiview
        - attn_dino
      print_trainable: true
      save_extra_trainable: true

    stable_diffusion_config:
      pretrained_model_name_or_path: /home/zengxiangzhao/.cache/huggingface/hub/models--tencent--Hunyuan3D-2.1/snapshots/0b94677654c57bb9a6b6845cd7b704ccf551d327/hunyuan3d-paintpbr-v2-1
      custom_pipeline: ./materialmvp

data:
  target: src.data.objaverse_hunyuan.DataModuleFromConfig
  params:
    batch_size: 1
    num_workers: 2
    train:
      -
        target: src.data.dataloader.objaverse_loader_forTexturePBR_paperpair.TextureDatasetPaperPair
        params:
          num_view: 6
          image_size: 256
          point_light_prob: 0.4
          json_path: examples_1000_lora.json
    validation:
      -
        target: src.data.dataloader.objaverse_loader_forTexturePBR_paperpair.TextureDatasetPaperPair
        params:
          num_view: 6
          image_size: 256
          point_light_prob: 0.4
          json_path: examples_1000_lora.json

lightning:
  modelcheckpoint:
    params:
      every_n_train_steps: 500
      save_top_k: -1
      save_last: true
  callbacks:
    lora_checkpoint:
      params:
        save_every_n_steps: 500
    grad_usage:
      params:
        every_n_steps: 100

  trainer:
    benchmark: true
    max_epochs: 3
    gradient_clip_val: 1.0
    val_check_interval: 1000
    num_sanity_val_steps: 0
    accumulate_grad_batches: 1
    check_val_every_n_epoch: null

init_control_from:
resume_from:
