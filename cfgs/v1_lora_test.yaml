model:
  base_learning_rate: 1.0e-04
  target: materialmvp.model.MaterialMVP
  params:
    num_view: 6
    view_size: 256
    drop_cond_prob: 0.1

    noise_in_channels: 12

    lora_config:
      enabled: true
      rank: 8
      alpha: 8
      dropout: 0.0
      gradient_checkpointing: true
      train_extra_params: true
      extra_trainable_keywords:
        - learned_text_clip_albedo
        - learned_text_clip_mr
        - learned_text_clip_ref
        - image_proj_model_dino.proj
      target_suffixes:
        - to_q
        - to_k
        - to_v
        - to_out.0
        - to_q_mr
        - to_k_mr
        - to_v_mr
        - to_out_mr.0
      include_keywords: []
      exclude_keywords: []
      print_trainable: true

    stable_diffusion_config:
      pretrained_model_name_or_path: /home/zengxiangzhao/.cache/huggingface/hub/models--tencent--Hunyuan3D-2.1/snapshots/0b94677654c57bb9a6b6845cd7b704ccf551d327/hunyuan3d-paintpbr-v2-1
      custom_pipeline: ./materialmvp

data:
  target: src.data.objaverse_hunyuan.DataModuleFromConfig
  params:
    batch_size: 1
    num_workers: 0
    train:
      -
        target: src.data.dataloader.objaverse_loader_forTexturePBR_paperpair.TextureDatasetPaperPair
        params:
          num_view: 6
          image_size: 512
          point_light_prob: 0.4
          json_path: materialmvp_dataset_test1/examples_lora_test.json
    validation:
      -
        target: src.data.dataloader.objaverse_loader_forTexturePBR_paperpair.TextureDatasetPaperPair
        params:
          num_view: 6
          image_size: 512
          point_light_prob: 0.4
          json_path: materialmvp_dataset_test1/examples_lora_test.json

lightning:
  modelcheckpoint:
    params:
      every_n_train_steps: 100
      save_top_k: -1
      save_last: true
  callbacks: {}

  trainer:
    benchmark: true
    max_epochs: -1
    max_steps: 20
    gradient_clip_val: 1.0
    val_check_interval: 1000
    num_sanity_val_steps: 0
    accumulate_grad_batches: 1
    check_val_every_n_epoch: null

init_control_from:
resume_from:
